<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fund Manager</title>

<style>
body { font-family: Arial; background:#f4f5f7; margin:0; }
.header { padding:15px; font-weight:bold; display:flex; justify-content:space-between; }
.container { padding:10px; }
.card { background:white; padding:12px; border-radius:12px; margin-bottom:10px; }
.row { display:flex; justify-content:space-between; align-items:center; }
.input { width:80px; padding:5px; border-radius:8px; border:1px solid #ccc; }
.nav { position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; padding:10px; border-top:1px solid #ddd; }
.progress { height:6px; background:#eee; border-radius:10px; }
.bar { height:6px; background:green; }
</style>

</head>

<body>

<div class="header">
  Welcome Yogi
  <span onclick="changeMonth(-1)">⬅</span>
  <b id="monthDisplay">March 2026</b>
  <span onclick="changeMonth(1)">➡</span>
</div>

<div class="container" id="monthlyPage"></div>
<div class="container" id="summaryPage" style="display:none"></div>

<div class="nav">
  <div onclick="showPage('monthly')">📅 Monthly</div>
  <div onclick="showPage('summary')">📊 Summary</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5DjcZ52k6RgC_e9EtAQTE97iQOqxm2mk",
  authDomain: "gully-boys-fund.firebaseapp.com",
  projectId: "gully-boys-fund"
};
  const monthsList = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

window.changeMonth = function(step){
  let month = localStorage.getItem("month") || "March";
  let year = Number(localStorage.getItem("year")) || 2026;

  let index = monthsList.indexOf(month);

  index += step;

  if(index < 0){
    index = 11;
    year--;
  }

  if(index > 11){
    index = 0;
    year++;
  }

  localStorage.setItem("month", monthsList[index]);
  localStorage.setItem("year", year);

  location.reload();
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.showPage = function(p){
  document.getElementById("monthlyPage").style.display = p==="monthly"?"block":"none";
  document.getElementById("summaryPage").style.display = p==="summary"?"block":"none";
};

function getMonth(){
  return localStorage.getItem("month") || "March";
}
function getYear(){
  return Number(localStorage.getItem("year")) || 2026;
}

function renderMonthly(data){
  document.getElementById("monthDisplay").innerText = getMonth() + " " + getYear();
  const div = document.getElementById("monthlyPage");
  div.innerHTML = "";

  const filtered = data.filter(d => d.month===getMonth() && d.year===getYear());

  let total = 0;

  filtered.forEach(m=>{
    total += m.amount || 0;

    div.innerHTML += `
    <div class="card">
      <div class="row">
        <b>${m.name}</b>
        <span onclick="toggle('${m.id}', ${m.paid})">${m.paid ? "✔":"❌"}</span>
      </div>

      <div class="row">
        ₹ <input class="input" value="${m.amount}" onchange="updateAmount('${m.id}', this.value)">
        <span onclick="whatsapp('${m.name}', ${m.amount})">💬</span>
      </div>
    </div>`;
  });

  div.innerHTML = `
  <div class="card">
    <b>${getMonth()} ${getYear()}</b><br>
    Collected: ₹${total}
  </div>` + div.innerHTML;
}

function renderSummary(data){
  const div = document.getElementById("summaryPage");

  const year = getYear();

  const members = ["Loka","Balu","Venky","Raju","Suresh","Mohan","Yogi"];
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  let total = 0;
  let memberTotals = {};

  data.forEach(d=>{
    if(d.year === year && d.paid){
      total += d.amount || 0;
      memberTotals[d.name] = (memberTotals[d.name] || 0) + d.amount;
    }
  });

  let html = `
  <div class="card">
    <b>Total Fund Collected (${year})</b>
    <h3>₹${total}</h3>
    <div class="progress">
      <div class="bar" style="width:${(total/16800)*100}%"></div>
    </div>
  </div>
  `;

  members.forEach(m=>{
    html += `<div class="card row"><span>${m}</span><b>₹${memberTotals[m] || 0}</b></div>`;
  });

  html += `
  <div class="card" style="overflow-x:auto">
  <b>${year} Breakdown</b><br><br>
  <table style="width:100%; font-size:12px; text-align:center;">
  <tr><th>Member</th>${months.map(m=>`<th>${m.substring(0,3)}</th>`).join("")}<th>Total</th></tr>
  `;

  members.forEach(name=>{
    let rowTotal = 0;
    html += `<tr><td><b>${name}</b></td>`;

    months.forEach(month=>{
      const entry = data.find(d=>d.name===name && d.month===month && d.year===year);
      const amount = entry ? (entry.amount || 0) : 0;
      const paid = entry ? entry.paid : false;

      rowTotal += amount;

      html += `<td><div style="background:${paid?'#c8f7c5':'#eee'};border-radius:50%;padding:4px;">${amount||'-'}</div></td>`;
    });

    html += `<td><b>₹${rowTotal}</b></td></tr>`;
  });

  html += `</table></div>`;

  div.innerHTML = html;
}

onSnapshot(collection(db,"fund"), snap=>{
  const data = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderMonthly(data);
  renderSummary(data);
});

window.updateAmount = async (id,val)=>{
  await updateDoc(doc(db,"fund",id), {amount:Number(val)});
};

window.toggle = async (id,current)=>{
  await updateDoc(doc(db,"fund",id), {paid:!current});
};

window.whatsapp = (name, amount)=>{
  window.open("https://wa.me/?text="+encodeURIComponent(`Hi ${name}, please pay ₹${amount}`));
};

window.exportData = ()=>{
  alert("Export coming next upgrade 🚀");
};
</script>

</body>
</html>
