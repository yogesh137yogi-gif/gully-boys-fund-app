<script src="https://unpkg.com/lucide@latest"></script><style>

</style></head><body><header>

</header><div class="container">
  <h3 id="currentDisplayTitle"></h3>
  <div id="adminPanel" class="card hidden">

  <select id="monthSelect">
    <option>January</option><option>February</option><option>March</option>

</nav><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
//import { getFirestore, collection, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, collection, onSnapshot, updateDoc, doc, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey:"AIzaSyB5DjcZ52k6RgC_e9EtAQTE97iQOqxm2mk",
 authDomain:"gully-boys-fund.firebaseapp.com",
 projectId:"gully-boys-fund"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const members=["Loka","Balu","Venky","Raju","Suresh","Mohan","Yogi"];

window.createMonth = async function(){

const month = document.getElementById("monthSelect").value;
const year = Number(document.getElementById("yearInput").value);

const snapshot = await getDocs(collection(db,"fund"));

const exists = snapshot.docs.some(d =>
d.data().month === month && d.data().year === year
);

if(exists){
alert("Month already exists!");
return;
}

for(let name of members){
await addDoc(collection(db,"fund"),{
name,
month,
year,
amount:0,
paid:false
});
}

alert("Month created successfully!");
};


window.latestData=[];
window.isOwner=false;

function getMonth(){return localStorage.getItem("month")||new Date().toLocaleString('default',{month:'long'});}
function getYear(){return Number(localStorage.getItem("year"))||new Date().getFullYear();}

window.switchTab=(t)=>{
  document.getElementById("app").classList.toggle("hidden",t==="summary");
  document.getElementById("summaryPage").classList.toggle("hidden",t!=="summary");
};

window.showLogin=()=>document.getElementById("loginDiv").classList.remove("hidden");

window.closeLogin=()=>{
 document.getElementById("loginDiv").classList.add("hidden");
 window.isOwner=false;
 document.getElementById("modeTag").innerText="Viewer Mode";
 render(window.latestData,false);
};

window.login = () => {
const e = email.value;
const p = password.value;

signInWithEmailAndPassword(auth, e, p)
.then(() => {
// ✅ ONLY hide popup
document.getElementById("loginDiv").classList.add("hidden");

})
.catch(err => alert(err.message));
```

};
onAuthStateChanged(auth,(user)=>{
window.isOwner = !!user;

document.getElementById("modeTag").innerText =
user ? "Owner Mode" : "Viewer Mode";

// ✅ SHOW CREATE MONTH PANEL
document.getElementById("adminPanel").classList.toggle("hidden", !user);

render(window.latestData, window.isOwner);
});



function render(data,isOwner){
 const appDiv=document.getElementById("app");
 appDiv.innerHTML="";
 const month=getMonth(),year=getYear();

 document.getElementById("currentDisplayTitle").innerText=`${month} ${year}`;

 const filtered=data.filter(d=>d.month===month&&d.year===year);

 let total=0;

 filtered.forEach(m=>{
  if(m.paid) total+=m.amount||0;

  const div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
  <div class="member-row">
    <b>${m.name}</b>
    ${isOwner?`
      <div class="amount-box">₹
        <input value="${m.amount}" onchange="updateAmount('${m.id}',this.value)">
      </div>
      <button class="status-btn ${m.paid?'paid':''}" onclick="toggle('${m.id}',${m.paid})">
        ${m.paid?'✔':'❌'}
      </button>
    `:`₹${m.amount}`}
  </div>`;

  appDiv.appendChild(div);
 });

 document.getElementById("collectedStat").innerText=`₹${total}`;

 renderSummary(data);
}

function renderSummary(data){
 const year=getYear();
 const months=["January","February","March","April","May","June","July","August","September","October","November","December"];

 let memberTotals={},monthTotals={},grand=0;
 members.forEach(m=>memberTotals[m]=0);
 months.forEach(m=>monthTotals[m]=0);

 data.forEach(d=>{
  if(d.year===year&&d.paid){
   memberTotals[d.name]+=d.amount||0;
   monthTotals[d.month]+=d.amount||0;
   grand+=d.amount||0;
  }
 });

 let html=`<div class="card"><div class="summary">₹${grand}</div></div>`;

 members.forEach(m=>{
  html+=`<div class="card" style="display:flex;justify-content:space-between">
  <span>${m}</span><b>₹${memberTotals[m]}</b></div>`;
 });

 html+=`<div class="table-container"><table><tr>
 <th>Member</th>${months.map(m=>`<th>${m.slice(0,3)}</th>`).join("")}<th>Total</th></tr>`;

 members.forEach(n=>{
  let row=0;
  html+=`<tr><td>${n}</td>`;
  months.forEach(m=>{
   const e=data.find(d=>d.name===n&&d.month===m&&d.year===year&&d.paid);
   const a=e?e.amount:0;
   row+=a;
   html+=`<td>${a||"-"}</td>`;
  });
  html+=`<td>₹${row}</td></tr>`;
 });

 html+=`<tr><td>Total</td>`;
 months.forEach(m=>html+=`<td>₹${monthTotals[m]}</td>`);
 html+=`<td>₹${grand}</td></tr></table></div>`;

 document.getElementById("summaryPage").innerHTML=html;
}

window.toggle=async(id,current)=>{
 if(!window.isOwner)return alert("Owner only");
 await updateDoc(doc(db,"fund",id),{paid:!current});
};

window.updateAmount=async(id,val)=>{
 if(!window.isOwner)return alert("Owner only");
 await updateDoc(doc(db,"fund",id),{amount:Number(val)});
};

onSnapshot(collection(db,"fund"),snap=>{
 const data=snap.docs.map(d=>({id:d.id,...d.data()}));
 window.latestData=data;
 render(data,window.isOwner);
});
</script></body>
</html>
