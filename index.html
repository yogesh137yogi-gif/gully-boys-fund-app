<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fund Manager</title>

<style>
body { font-family: Arial; background:#f4f5f7; margin:0; }

.header {
  padding:15px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container { padding:10px; }

.card {
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.input {
  width:80px;
  padding:5px;
  border-radius:8px;
  border:1px solid #ccc;
  text-align:center;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
  z-index:999;
}
</style>

</head>

<body>

<div class="header">
  <span onclick="changeMonth(-1)">⬅</span>
  <b id="monthDisplay">March 2026</b>
  <span onclick="changeMonth(1)">➡</span>
</div>

<div class="container" id="monthlyPage"></div>
<div class="container" id="summaryPage" style="display:none"></div>

<div class="nav">
  <div onclick="showPage('monthly')">📅 Monthly</div>
  <div onclick="showPage('summary')">📊 Summary</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5DjcZ52k6RgC_e9EtAQTE97iQOqxm2mk",
  authDomain: "gully-boys-fund.firebaseapp.com",
  projectId: "gully-boys-fund"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// 🔐 OWNER CONTROL
const OWNER_EMAIL = "yogesh137.yogi@gmail.com";
let isOwner = false;

// 📅 MONTH LIST
const monthsList = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

// 🔄 MONTH CHANGE
window.changeMonth = function(step){
  let month = localStorage.getItem("month") || "March";
  let year = Number(localStorage.getItem("year")) || 2026;

  let index = monthsList.indexOf(month);
  index += step;

  if(index < 0){ index = 11; year--; }
  if(index > 11){ index = 0; year++; }

  localStorage.setItem("month", monthsList[index]);
  localStorage.setItem("year", year);

  location.reload();
};

function getMonth(){ return localStorage.getItem("month") || "March"; }
function getYear(){ return Number(localStorage.getItem("year")) || 2026; }

// 📄 PAGE SWITCH
window.showPage = function(p){
  document.getElementById("monthlyPage").style.display = p==="monthly"?"block":"none";
  document.getElementById("summaryPage").style.display = p==="summary"?"block":"none";
};

// 📅 MONTHLY VIEW
function renderMonthly(data){
  const div = document.getElementById("monthlyPage");
  div.innerHTML = "";

  const month = getMonth();
  const year = getYear();

  document.getElementById("monthDisplay").innerText = month + " " + year;

  const members = ["Loka","Balu","Venky","Raju","Suresh","Mohan","Yogi"];

  let total = 0;

  members.forEach(name => {

    const entry = data.find(d =>
      d.name === name &&
      d.month === month &&
      d.year === year
    );

    const amount = entry ? entry.amount : 0;
    const paid = entry ? entry.paid : false;
    const id = entry ? entry.id : null;

    total += amount;

    div.innerHTML += `
    <div class="card">
      <div class="row">
        <b>${name}</b>
        ${isOwner ? `<span onclick="toggle('${id}', ${paid}, '${name}')">${paid ? "✔":"❌"}</span>` : ""}
      </div>

      <div class="row">
        ₹ <input class="input" value="${amount}" 
        ${!isOwner ? "disabled" : ""}
        onchange="updateAmount('${id}','${name}', this.value)">
        ${!paid ? `<span onclick="whatsapp('${name}', ${amount})">💬</span>` : ""}
      </div>
    </div>`;
  });

  div.innerHTML = `
  <div class="card">
    <b>${month} ${year}</b><br>
    Collected: ₹${total}
  </div>` + div.innerHTML;
}

// 📊 SUMMARY VIEW
function renderSummary(data){
  const div = document.getElementById("summaryPage");

  const year = getYear();

  let total = 0;

  data.forEach(d=>{
    if(d.year === year && d.paid){
      total += d.amount || 0;
    }
  });

  div.innerHTML = `
  <div class="card">
    <b>Total Collected (${year})</b>
    <h3>₹${total}</h3>
  </div>`;
}

// 🔄 REALTIME DATA
onSnapshot(collection(db,"fund"), snap=>{
  const data = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderMonthly(data);
  renderSummary(data);
});

// 🔐 AUTH CHECK
onAuthStateChanged(auth, user => {
  if(user && user.email === OWNER_EMAIL){
    isOwner = true;
  } else {
    isOwner = false;
  }
});

// ✏️ UPDATE
window.updateAmount = async function(id, name, val){
  const month = getMonth();
  const year = getYear();

  if(id){
    await updateDoc(doc(db,"fund",id), { amount: Number(val) });
  } else {
    await addDoc(collection(db,"fund"), {
      name, month, year, amount:Number(val), paid:false
    });
  }
};

// ✔ TOGGLE
window.toggle = async function(id, current, name){
  const month = getMonth();
  const year = getYear();

  if(id){
    await updateDoc(doc(db,"fund",id), { paid: !current });
  } else {
    await addDoc(collection(db,"fund"), {
      name, month, year, amount:0, paid:true
    });
  }
};

// 💬 WHATSAPP
window.whatsapp = (name, amount)=>{
  window.open("https://wa.me/?text="+encodeURIComponent(`Hi ${name}, please pay ₹${amount}`));
};

</script>

</body>
</html>
