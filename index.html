<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fund Manager</title>

<style>
body { font-family: Arial; background:#f4f5f7; margin:0; }

.header {
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.container { padding:10px; }

.card {
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.input {
  width:80px;
  padding:5px;
  border-radius:8px;
  border:1px solid #ccc;
  text-align:center;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
}
table { width:100%; font-size:12px; text-align:center; }
</style>

</head>

<body>

<div class="header">
  <span onclick="changeMonth(-1)">⬅</span>
  <b id="monthDisplay"></b>
  <span onclick="changeMonth(1)">➡</span>
</div>

<div class="container" id="monthlyPage"></div>
<div class="container" id="summaryPage" style="display:none"></div>

<div class="nav">
  <div onclick="showPage('monthly')">📅 Monthly</div>
  <div onclick="showPage('summary')">📊 Summary</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, setDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5DjcZ52k6RgC_e9EtAQTE97iQOqxm2mk",
  authDomain: "gully-boys-fund.firebaseapp.com",
  projectId: "gully-boys-fund"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const members = ["Loka","Balu","Venky","Raju","Suresh","Mohan","Yogi"];

const months = ["January","February","March","April","May","June",
"July","August","September","October","November","December"];

function getMonth(){ return localStorage.getItem("month") || "March"; }
function getYear(){ return Number(localStorage.getItem("year")) || 2026; }

window.changeMonth = function(step){
  let m = getMonth();
  let y = getYear();
  let i = months.indexOf(m) + step;

  if(i < 0){ i=11; y--; }
  if(i > 11){ i=0; y++; }

  localStorage.setItem("month", months[i]);
  localStorage.setItem("year", y);
  location.reload();
};

window.showPage = function(p){
  document.getElementById("monthlyPage").style.display = p==="monthly"?"block":"none";
  document.getElementById("summaryPage").style.display = p==="summary"?"block":"none";
};

// 🔥 MAIN RENDER
function render(data){

  const month = getMonth();
  const year = getYear();

  document.getElementById("monthDisplay").innerText = month + " " + year;

  const monthlyDiv = document.getElementById("monthlyPage");
  monthlyDiv.innerHTML = "";

  let total = 0;

  members.forEach(name=>{

    const key = name + "_" + month + "_" + year;

    const entry = data[key] || {};

const amount = entry.amount ?? 0;
const paid = entry.paid ?? false;


    total += entry.amount;

    monthlyDiv.innerHTML += `
    <div class="card">
      <div class="row">
        <b>${name}</b>
        <span onclick="toggle('${key}', ${paid})">
          ${entry.paid ? "✔":"❌"}
        </span>
      </div>

      <div class="row">
        ₹ <input class="input" value="${entry.amount}"
        onchange="updateAmount('${key}', '${name}', this.value)">
        ${!entry.paid ? `<span onclick="whatsapp('${name}', ${entry.amount})">💬</span>` : ""}
      </div>
    </div>`;
  });

  monthlyDiv.innerHTML = `
  <div class="card">
    <b>${month} ${year}</b><br>
    Collected: ₹${total}
  </div>` + monthlyDiv.innerHTML;

  renderSummary(data);
}

// 🔥 SUMMARY (unchanged style)
function renderSummary(data){
  const div = document.getElementById("summaryPage");
  const year = getYear();

  let total = 0;
  let memberTotals = {};

  Object.values(data).forEach(d=>{
    if(d.year===year && d.paid){
      total += d.amount;
      memberTotals[d.name]=(memberTotals[d.name]||0)+d.amount;
    }
  });

  let html = `<div class="card"><b>Overall Summary</b><h2>₹${total}</h2></div>`;

  members.forEach(m=>{
    html += `<div class="card row"><span>${m}</span><b>₹${memberTotals[m]||0}</b></div>`;
  });

  html += `<div class="card"><table>
  <tr><th>Member</th>${months.map(m=>`<th>${m.slice(0,3)}</th>`).join("")}</tr>`;

  members.forEach(name=>{
    html+=`<tr><td>${name}</td>`;
    months.forEach(m=>{
      const key=name+"_"+m+"_"+year;
      const amt=data[key]?.amount || 0;
      html+=`<td>${amt||"-"}</td>`;
    });
    html+=`</tr>`;
  });

  html+=`</table></div>`;

  div.innerHTML = html;
}

// 🔄 REALTIME
onSnapshot(collection(db,"fund"), snap=>{
  let map = {};
  snap.docs.forEach(d=>{
    const v=d.data();
    const key=v.name+"_"+v.month+"_"+v.year;
    map[key]=v;
  });
  render(map);
});

// 🔧 UPDATE
window.updateAmount = async function(key, name, val){

const [n, m, y] = key.split("_");

await setDoc(doc(db,"fund",key),{
name:n,
month:m,
year:Number(y),
amount:Number(val)
}, { merge:true });
};


// 🔧 TOGGLE
window.toggle = async function(key, current){

const [name, month, year] = key.split("_");

await setDoc(doc(db,"fund",key),{
name,
month,
year: Number(year),
paid: !current
}, { merge:true });
};



window.whatsapp = (name,amount)=>{
  window.open("https://wa.me/?text="+encodeURIComponent(`Hi ${name}, please pay ₹${amount}`));
};

</script>

</body>
</html>
