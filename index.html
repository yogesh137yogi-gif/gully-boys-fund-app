<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gully Boys Fund</title>

<style>
body {
  font-family: Arial;
  background:#f5f6f8;
  padding:15px;
}

h2 { text-align:center; }

.container { max-width:500px; margin:auto; }

.card {
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.progress {
  height:6px;
  background:#eee;
  border-radius:10px;
  margin-top:8px;
}

.progress-bar {
  height:6px;
  background:#4CAF50;
  border-radius:10px;
}

.member {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.circle {
  width:35px;
  height:35px;
  border-radius:50%;
  background:#e0f2f1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

.table {
  overflow-x:auto;
}

table {
  width:100%;
  border-collapse:collapse;
}

td, th {
  text-align:center;
  padding:5px;
  font-size:12px;
}

.paid { background:#c8f7c5; border-radius:50%; padding:5px;}
.unpaid { background:#eee; border-radius:50%; padding:5px;}
</style>

</head>

<body>

<div class="container">

<h2>Yearly Summary</h2>

<div class="card row">
  <button onclick="changeYear(-1)">⬅</button>
  <b id="yearDisplay">2026</b>
  <button onclick="changeYear(1)">➡</button>
</div>

<div class="card">
  <div>Total Collected</div>
  <h3 id="totalYear">₹0</h3>
  <div class="progress">
    <div id="progressBar" class="progress-bar" style="width:0%"></div>
  </div>
</div>

<div id="members"></div>

<div class="card table">
  <b>Monthly Breakdown</b>
  <table id="table"></table>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5DjcZ52k6RgC_e9EtAQTE97iQOqxm2mk",
  authDomain: "gully-boys-fund.firebaseapp.com",
  projectId: "gully-boys-fund",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedYear = 2026;
const membersList = ["Loka","Balu","Venky","Raju","Suresh","Mohan","Yogi"];
const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

window.changeYear = function(val){
  selectedYear += val;
  render(window.allData);
};

function render(data){
  if(!data) return;

  const yearData = data.filter(d => d.year == selectedYear);

  let total = 0;
  let memberTotals = {};

  yearData.forEach(d=>{
    if(d.paid){
      total += d.amount || 0;
      memberTotals[d.name] = (memberTotals[d.name] || 0) + d.amount;
    }
  });

  document.getElementById("yearDisplay").innerText = selectedYear;
  document.getElementById("totalYear").innerText = "₹" + total;

  let percent = (total / 16800) * 100;
  document.getElementById("progressBar").style.width = percent + "%";

  // Members
  let html="";
  membersList.forEach(m=>{
    html += `
    <div class="card member">
      <div class="row">
        <div class="circle">${m[0]}</div>
        <div style="margin-left:10px">${m}</div>
      </div>
      <div>₹${memberTotals[m] || 0}</div>
    </div>`;
  });

  document.getElementById("members").innerHTML = html;

  // Table
  let table = "<tr><th>Member</th>";
  months.forEach(m=> table += `<th>${m}</th>`);
  table += "</tr>";

  membersList.forEach(name=>{
    table += `<tr><td>${name}</td>`;

    months.forEach((m,i)=>{
      const fullMonth = new Date(2026,i).toLocaleString('default',{month:'long'});
      const found = yearData.find(d=> d.name===name && d.month===fullMonth);

      table += `<td>
        <span class="${found && found.paid ? 'paid':'unpaid'}">
          ${found ? found.amount : '-'}
        </span>
      </td>`;
    });

    table += "</tr>";
  });

  document.getElementById("table").innerHTML = table;
}

onSnapshot(collection(db,"fund"), snap=>{
  window.allData = snap.docs.map(d=>d.data());
  render(window.allData);
});
</script>

</body>
</html>
