<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gully Boys Fund</title>

<style>
body { font-family: Arial; padding: 15px; background:#f5f5f5;}
h2 { text-align:center; }
.card { background:white; padding:10px; margin:10px 0; border-radius:10px; }
input { padding:5px; width:80px; }
button { padding:5px 10px; margin-top:5px; }
.summary { background:#222; color:white; padding:10px; border-radius:10px; }
.topbar { display:flex; justify-content:space-between; align-items:center; }
</style>

</head>

<body>

<div class="topbar">
  <h2>Gully Boys Fund</h2>
  <select id="monthSelect">
  <option>January</option>
  <option>February</option>
  <option>March</option>
  <option>April</option>
  <option>May</option>
  <option>June</option>
  <option>July</option>
  <option>August</option>
  <option>September</option>
  <option>October</option>
  <option>November</option>
  <option>December</option>
</select>

<input id="yearInput" type="number" value="2026" style="width:80px">

<button onclick="createMonth()">➕ Create</button>
</div>

<div id="loginDiv">
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login (Owner)</button>
</div>

<div id="summary" class="summary"></div>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5DjcZ52k6RgC_e9EtAQTE97iQOqxm2mk",
  authDomain: "gully-boys-fund.firebaseapp.com",
  projectId: "gully-boys-fund",
  storageBucket: "gully-boys-fund.firebasestorage.app",
  messagingSenderId: "311493460566",
  appId: "1:311493460566:web:0c27b0faad80277568b1f7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const members = ["Loka","Balu","Venky","Raju","Suresh","Mohan","Yogi"];

function getCurrentMonth() {
  return new Date().toLocaleString('default', { month: 'long' });
}

function getCurrentYear() {
  return new Date().getFullYear();
}

async function createMonth() {
  const month = getCurrentMonth();
  const year = getCurrentYear();

  const snapshot = await getDocs(collection(db, "fund"));
  const exists = snapshot.docs.some(d => d.data().month === month && d.data().year === year);

  if (exists) {
    alert("Month already exists!");
    return;
  }

  for (let name of members) {
    await addDoc(collection(db, "fund"), {
      name,
      month,
      year,
      amount: 0,
      paid: false
    });
  }

  alert("New month created!");
}

window.createMonth = async function() {
  const month = document.getElementById("monthSelect").value;
  const year = Number(document.getElementById("yearInput").value);

  const snapshot = await getDocs(collection(db, "fund"));

  const exists = snapshot.docs.some(d =>
    d.data().month === month && d.data().year === year
  );

  if (exists) {
    alert("Month already exists!");
    return;
  }

  for (let name of members) {
    await addDoc(collection(db, "fund"), {
      name,
      month,
      year,
      amount: 0,
      paid: false
    });
  }

  alert(month + " " + year + " created!");
};

const appDiv = document.getElementById("app");
const summaryDiv = document.getElementById("summary");

function render(data, isOwner) {
  appDiv.innerHTML = "";

  let total = 0;

  const month = getCurrentMonth();
  const year = getCurrentYear();

  const filtered = data.filter(d => d.month === month && d.year === year);

  filtered.forEach(member => {
    if(member.paid) total += member.amount || 0;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${member.name}</b><br>
      Month: ${member.month} ${member.year}<br><br>

      Amount: 
      ${isOwner ? `<input value="${member.amount}" onchange="updateAmount('${member.id}', this.value)">` : member.amount}
      <br><br>

      Status: ${member.paid ? "Paid" : "Unpaid"}<br>

      ${isOwner ? `<button onclick="toggle('${member.id}', ${member.paid})">
        Mark ${member.paid ? "Unpaid" : "Paid"}
      </button>` : ""}
    `;

    appDiv.appendChild(div);
  });

  summaryDiv.innerHTML = `<b>Total Collected (${month}):</b> ₹${total}`;
}

onSnapshot(collection(db, "fund"), (snap) => {
  const data = snap.docs.map(d => ({id:d.id, ...d.data()}));
  render(data, window.isOwner || false);
});

window.login = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => window.isOwner = true)
    .catch(() => alert("Login failed"));
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    window.isOwner = true;
    document.getElementById("loginDiv").style.display = "none";
  } else {
    window.isOwner = false;
  }
});

window.toggle = async function(id, current){
  const ref = doc(db, "fund", id);
  await updateDoc(ref, { paid: !current });
};

window.updateAmount = async function(id, value){
  const ref = doc(db, "fund", id);
  await updateDoc(ref, { amount: Number(value) });
};

</script>

</body>
</html>
