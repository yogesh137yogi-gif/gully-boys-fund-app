<!DOCTYPE html>

<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gully Boys Fund</title>
  <style>
    body { font-family: Arial; padding: 15px; background:#f5f5f5;}
    h2 { text-align:center; }
    .card { background:white; padding:10px; margin:10px 0; border-radius:10px; }
    button { padding:5px 10px; border:none; border-radius:5px; }
    .paid { background:green; color:white; }
    .unpaid { background:red; color:white; }
  </style>
</head>

<body>

<h2>Gully Boys Fund</h2>

<div id="loginDiv">
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login (Owner)</button>
</div>

<div id="app" style="display:none;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5DjcZ52k6RgC_e9EtAQTE97iQOqxm2mk",
  authDomain: "gully-boys-fund.firebaseapp.com",
  projectId: "gully-boys-fund",
  storageBucket: "gully-boys-fund.firebasestorage.app",
  messagingSenderId: "311493460566",
  appId: "1:311493460566:web:0c27b0faad80277568b1f7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const members = [
  "Loka","Balu","Venky","Raju","Suresh","Mohan","Yogi"
];

const appDiv = document.getElementById("app");

function render(data, isOwner) {
  appDiv.innerHTML = "";

  members.forEach((name, i) => {
    const member = data.find(d => d.name === name) || {name, paid:false};

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${name}</b><br><br>
      Status: ${member.paid ? "Paid" : "Unpaid"}<br><br>
      ${isOwner ? `<button onclick="toggle('${member.id}', ${member.paid})">
        Mark ${member.paid ? "Unpaid" : "Paid"}
      </button>` : ""}
    `;

    appDiv.appendChild(div);
  });
}

onSnapshot(collection(db, "fund"), (snap) => {
  const data = snap.docs.map(d => ({id:d.id, ...d.data()}));
  render(data, window.isOwner);
});

window.login = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => window.isOwner = true)
    .catch(() => alert("Login failed"));
};

onAuthStateChanged(auth, (user) => {
  if(user){
    document.getElementById("loginDiv").style.display="none";
    appDiv.style.display="block";
  } else {
    appDiv.style.display="block";
  }
});

window.toggle = async function(id, current){
  const ref = doc(db, "fund", id);
  await updateDoc(ref, { paid: !current });
};

</script>

</body>
</html>
