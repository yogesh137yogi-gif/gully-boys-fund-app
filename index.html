<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gully Boys Fund</title>

<style>
body { font-family: Arial; padding: 15px; background:#f5f5f5;}
h2 { text-align:center; }
.card { background:white; padding:10px; margin:10px 0; border-radius:10px; }
input { padding:5px; width:80px; }
button { padding:5px 10px; margin-top:5px; }
.summary { background:#222; color:white; padding:10px; border-radius:10px; }
</style>

</head>

<body>

<h2>Gully Boys Fund</h2>

<div id="loginDiv">
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login (Owner)</button>
</div>

<div id="summary" class="summary"></div>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5DjcZ52k6RgC_e9EtAQTE97iQOqxm2mk",
  authDomain: "gully-boys-fund.firebaseapp.com",
  projectId: "gully-boys-fund",
  storageBucket: "gully-boys-fund.firebasestorage.app",
  messagingSenderId: "311493460566",
  appId: "1:311493460566:web:0c27b0faad80277568b1f7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const appDiv = document.getElementById("app");
const summaryDiv = document.getElementById("summary");

function getCurrentMonth() {
  const d = new Date();
  return d.toLocaleString('default', { month: 'long' });
}

function getCurrentYear() {
  return new Date().getFullYear();
}

function render(data, isOwner) {
  appDiv.innerHTML = "";

  let total = 0;

  data.forEach(member => {
    if(member.paid) total += member.amount || 0;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${member.name}</b><br>
      Month: ${member.month} ${member.year}<br><br>

      Amount: 
      ${isOwner ? `<input value="${member.amount}" onchange="updateAmount('${member.id}', this.value)">` : member.amount}
      <br><br>

      Status: ${member.paid ? "Paid" : "Unpaid"}<br>

      ${isOwner ? `<button onclick="toggle('${member.id}', ${member.paid})">
        Mark ${member.paid ? "Unpaid" : "Paid"}
      </button>` : ""}
    `;

    appDiv.appendChild(div);
  });

  summaryDiv.innerHTML = `
    <b>Total Collected:</b> ₹${total}
  `;
}

onSnapshot(collection(db, "fund"), (snap) => {
  const data = snap.docs.map(d => ({id:d.id, ...d.data()}));
  render(data, window.isOwner);
});

window.login = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => window.isOwner = true)
    .catch(() => alert("Login failed"));
};

onAuthStateChanged(auth, (user) => {
  if(user){
    document.getElementById("loginDiv").style.display="none";
  }
});

window.toggle = async function(id, current){
  const ref = doc(db, "fund", id);
  await updateDoc(ref, { paid: !current });
};

window.updateAmount = async function(id, value){
  const ref = doc(db, "fund", id);
  await updateDoc(ref, { amount: Number(value) });
};

</script>

</body>
</html>
