<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fund Manager</title>

<style>
body {
  font-family: Arial;
  background:#f4f5f7;
  margin:0;
}

.header {
  padding:15px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
}

.container {
  padding:10px;
}

.card {
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.input {
  width:80px;
  padding:5px;
  border-radius:8px;
  border:1px solid #ccc;
}

.btn {
  padding:5px 10px;
  border:none;
  border-radius:6px;
  background:#eee;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
}

.active { color:blue; }

.progress {
  height:6px;
  background:#eee;
  border-radius:10px;
}

.bar {
  height:6px;
  background:green;
}
</style>

</head>

<body>

<div class="header">
  Fund Manager
  <span onclick="exportData()">⬇</span>
</div>

<div class="container" id="monthlyPage"></div>
<div class="container" id="summaryPage" style="display:none"></div>

<div class="nav">
  <div onclick="showPage('monthly')" id="navMonthly">📅 Monthly</div>
  <div onclick="showPage('summary')" id="navSummary">📊 Summary</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5DjcZ52k6RgC_e9EtAQTE97iQOqxm2mk",
  authDomain: "gully-boys-fund.firebaseapp.com",
  projectId: "gully-boys-fund"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentPage = "monthly";

window.showPage = function(p){
  currentPage = p;
  document.getElementById("monthlyPage").style.display = p==="monthly"?"block":"none";
  document.getElementById("summaryPage").style.display = p==="summary"?"block":"none";
};

function getMonth(){
  return localStorage.getItem("month") || "March";
}
function getYear(){
  return Number(localStorage.getItem("year")) || 2026;
}

function renderMonthly(data){
  const div = document.getElementById("monthlyPage");
  div.innerHTML = "";

  const filtered = data.filter(d => d.month===getMonth() && d.year===getYear());

  let total = 0;

  filtered.forEach(m=>{
    total += m.amount || 0;

    div.innerHTML += `
    <div class="card">
      <div class="row">
        <b>${m.name}</b>
        <span onclick="toggle('${m.id}', ${m.paid})">${m.paid ? "✔":"❌"}</span>
      </div>

      <div class="row">
        ₹ <input class="input" value="${m.amount}" onchange="updateAmount('${m.id}', this.value)">
        <span onclick="whatsapp('${m.name}', ${m.amount})">💬</span>
      </div>
    </div>`;
  });

  div.innerHTML = `
  <div class="card">
    <b>${getMonth()} ${getYear()}</b><br>
    Collected: ₹${total}
  </div>` + div.innerHTML;
}

function renderSummary(data){
  const div = document.getElementById("summaryPage");

  let total = 0;
  let memberTotals = {};

  data.forEach(d=>{
    if(d.paid){
      total += d.amount || 0;
      memberTotals[d.name] = (memberTotals[d.name]||0) + d.amount;
    }
  });

  let html = `
  <div class="card">
    <b>Total Fund Collected</b>
    <h3>₹${total}</h3>
    <div class="progress">
      <div class="bar" style="width:${(total/16800)*100}%"></div>
    </div>
  </div>`;

  Object.keys(memberTotals).forEach(n=>{
    html += `<div class="card row"><span>${n}</span><b>₹${memberTotals[n]}</b></div>`;
  });

  div.innerHTML = html;
}

onSnapshot(collection(db,"fund"), snap=>{
  const data = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderMonthly(data);
  renderSummary(data);
});

window.updateAmount = async function(id,val){
  await updateDoc(doc(db,"fund",id), {amount:Number(val)});
};

window.toggle = async function(id,current){
  await updateDoc(doc(db,"fund",id), {paid:!current});
};

window.whatsapp = function(name, amount){
  const msg = `Hi ${name}, please pay ₹${amount}`;
  window.open("https://wa.me/?text="+encodeURIComponent(msg));
};

window.exportData = function(){
  alert("Export coming next upgrade 🚀");
};
</script>

</body>
</html>
