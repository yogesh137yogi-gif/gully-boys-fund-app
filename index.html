<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gully Boys Fund</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; padding: 15px; background:#f5f5f5;}
h2 { text-align:center; }
.card {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
  .row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.badge {
  background:#eee;
  padding:3px 8px;
  border-radius:10px;
  font-size:12px;
}

.green { color:#1a7f37; font-weight:bold; }
.red { color:#d11a2a; font-weight:bold; }
input { padding:5px; width:80px; }
button { padding:5px 10px; margin-top:5px; }
.topbar { display:flex; flex-wrap:wrap; gap:10px; justify-content:space-between; align-items:center; }
canvas { background:white; border-radius:10px; margin-top:10px; }
</style>

</head>

<body>

<div class="topbar">
  <h2>Gully Boys Fund</h2>

  <div>
    <select id="monthSelect">
      <option>January</option><option>February</option><option>March</option>
      <option>April</option><option>May</option><option>June</option>
      <option>July</option><option>August</option><option>September</option>
      <option>October</option><option>November</option><option>December</option>
    </select>

```
<input id="yearInput" type="number" value="2026" style="width:80px">
<button onclick="createMonth()">➕ Create</button>
```

  </div>
</div>

<br>

<div>
  <select id="viewMonth"></select>
  <input id="viewYear" type="number" value="2026" style="width:80px">
  <button onclick="loadMonth()">View</button>
</div>

<br>

<canvas id="monthlyChart"></canvas> <canvas id="yearlyChart"></canvas>

<br>

<div id="loginDiv">
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login (Owner)</button>
</div>

<div id="app"></div>
<div id="summaryPage"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5DjcZ52k6RgC_e9EtAQTE97iQOqxm2mk",
  authDomain: "gully-boys-fund.firebaseapp.com",
  projectId: "gully-boys-fund",
  storageBucket: "gully-boys-fund.firebasestorage.app",
  messagingSenderId: "311493460566",
  appId: "1:311493460566:web:0c27b0faad80277568b1f7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const members = ["Loka","Balu","Venky","Raju","Suresh","Mohan","Yogi"];

let monthlyChart, yearlyChart;

function getCurrentMonth() {
  return new Date().toLocaleString('default', { month: 'long' });
}
function getCurrentYear() {
  return new Date().getFullYear();
}

window.createMonth = async function() {
  const month = document.getElementById("monthSelect").value;
  const year = Number(document.getElementById("yearInput").value);

  const snapshot = await getDocs(collection(db, "fund"));
  const exists = snapshot.docs.some(d =>
    d.data().month === month && d.data().year === year
  );

  if (exists) {
    alert("Month already exists!");
    return;
  }

  for (let name of members) {
    await addDoc(collection(db, "fund"), {
      name, month, year, amount: 0, paid: false
    });
  }

  alert(month + " " + year + " created!");
};

window.loadMonth = function() {
  const m = document.getElementById("viewMonth").value;
  const y = Number(document.getElementById("viewYear").value);

  localStorage.setItem("month", m);
  localStorage.setItem("year", y);

  location.reload();
};

const appDiv = document.getElementById("app");

function render(data, isOwner) {
  appDiv.innerHTML = "";

  const month = localStorage.getItem("month") || getCurrentMonth();
  const year = Number(localStorage.getItem("year")) || getCurrentYear();

  const filtered = data.filter(d => d.month === month && d.year === year);

  // 📊 Monthly chart
  const names = filtered.map(m => m.name);
  const amounts = filtered.map(m => m.amount || 0);

  if(monthlyChart) monthlyChart.destroy();
  monthlyChart = new Chart(document.getElementById("monthlyChart"), {
    type: "bar",
    data: {
      labels: names,
      datasets: [{ label: "Monthly", data: amounts }]
    }
  });

  // 📊 Yearly totals
  let yearlyTotals = {};
  data.forEach(d => {
    if(d.year === year){
      yearlyTotals[d.name] = (yearlyTotals[d.name] || 0) + (d.amount || 0);
    }
  });

  if(yearlyChart) yearlyChart.destroy();
  yearlyChart = new Chart(document.getElementById("yearlyChart"), {
    type: "pie",
    data: {
      labels: Object.keys(yearlyTotals),
      datasets: [{ data: Object.values(yearlyTotals) }]
    }
  });

  // Cards
  filtered.forEach(member => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${member.name}</b><br>
      Month: ${member.month} ${member.year}<br><br>

      Amount: 
      ${isOwner ? `<input value="${member.amount}" onchange="updateAmount('${member.id}', this.value)">` : member.amount}
      <br><br>

      Status: ${member.paid ? "Paid" : "Unpaid"}<br>

      ${isOwner ? `<button onclick="toggle('${member.id}', ${member.paid})">
        Mark ${member.paid ? "Unpaid" : "Paid"}
      </button>` : ""}
    `;

    appDiv.appendChild(div);
  });
  renderSummary(data);

}
  function renderSummary(data){

const year = Number(localStorage.getItem("year")) || new Date().getFullYear();
const months = ["January","February","March","April","May","June",
"July","August","September","October","November","December"];

let memberTotals = {};
let monthTotals = {};
let grandTotal = 0;

members.forEach(m=>{
memberTotals[m] = 0;
});

months.forEach(m=>{
monthTotals[m] = 0;
});

data.forEach(d=>{
if(d.year === year && d.paid){
memberTotals[d.name] += d.amount || 0;
monthTotals[d.month] += d.amount || 0;
grandTotal += d.amount || 0;
}
});

let html = `

  <div class="card">
    <b>Overall Summary</b><br><br>
    <div class="green" style="font-size:22px;">₹${grandTotal}</div>
  </div>
  `;

members.forEach(m=>{
html += `     <div class="card row">       <span>${m}</span>       <b>₹${memberTotals[m]}</b>     </div>`;
});

html += `<div class="card" style="overflow:auto;"> <b>${year} Breakdown</b><br><br>

  <table border="0" style="width:100%; font-size:12px;">
  <tr>
    <th>Member</th>
    ${months.map(m=>`<th>${m.substring(0,3)}</th>`).join("")}
    <th>Total</th>
  </tr>`;

members.forEach(name=>{
let rowTotal = 0;

html += `<tr><td><b>${name}</b></td>`;

months.forEach(month=>{
  const entry = data.find(d =>
    d.name === name &&
    d.month === month &&
    d.year === year &&
    d.paid
  );

  const amount = entry ? entry.amount : 0;

  rowTotal += amount;

  html += `<td>${amount || "-"}</td>`;
});

html += `<td><b>₹${rowTotal}</b></td></tr>`;

});

html += `<tr><td><b>Total</b></td>`;

months.forEach(m=>{
html += `<td><b>₹${monthTotals[m]}</b></td>`;
});

html += `<td><b>₹${grandTotal}</b></td></tr>`;

html += `</table></div>`;

document.getElementById("summaryPage").innerHTML = html;
}


onSnapshot(collection(db, "fund"), (snap) => {
  const data = snap.docs.map(d => ({id:d.id, ...d.data()}));
  render(data, window.isOwner || false);

  const months = [...new Set(data.map(d => d.month))];
  document.getElementById("viewMonth").innerHTML =
    months.map(m => `<option>${m}</option>`).join("");
});

window.login = function() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .catch(() => alert("Login failed"));
};

onAuthStateChanged(auth, (user) => {
  if (user) {
    window.isOwner = true;
    document.getElementById("loginDiv").style.display = "none";
  } else {
    window.isOwner = false;
  }
});

window.toggle = async function(id, current){
  const ref = doc(db, "fund", id);
  await updateDoc(ref, { paid: !current });
};

window.updateAmount = async function(id, value){
  const ref = doc(db, "fund", id);
  await updateDoc(ref, { amount: Number(value) });
};
</script>

</body>
</html>
