<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fund Manager</title>

<style>
body { font-family: Arial; background:#f4f5f7; margin:0; }

.header {
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.container { padding:10px; }

.card {
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.input {
  width:80px;
  padding:5px;
  border-radius:8px;
  border:1px solid #ccc;
  text-align:center;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
}

table { width:100%; font-size:12px; text-align:center; }
td, th { padding:6px; }
</style>

</head>

<body>

<div class="header">
  <span onclick="changeMonth(-1)">⬅</span>
  <b id="monthDisplay">March 2026</b>
  <span onclick="changeMonth(1)">➡</span>
</div>

<div class="container" id="monthlyPage"></div>
<div class="container" id="summaryPage" style="display:none"></div>

<div class="nav">
  <div onclick="showPage('monthly')">📅 Monthly</div>
  <div onclick="showPage('summary')">📊 Summary</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5DjcZ52k6RgC_e9EtAQTE97iQOqxm2mk",
  authDomain: "gully-boys-fund.firebaseapp.com",
  projectId: "gully-boys-fund"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔐 TEMP OWNER MODE (STABLE)
let isOwner = true;

// 📅 MONTHS
const months = ["January","February","March","April","May","June",
"July","August","September","October","November","December"];

function getMonth(){ return localStorage.getItem("month") || "March"; }
function getYear(){ return Number(localStorage.getItem("year")) || 2026; }

window.changeMonth = function(step){
  let m = getMonth();
  let y = getYear();
  let i = months.indexOf(m) + step;

  if(i < 0){ i=11; y--; }
  if(i > 11){ i=0; y++; }

  localStorage.setItem("month", months[i]);
  localStorage.setItem("year", y);
  location.reload();
};

window.showPage = function(p){
  document.getElementById("monthlyPage").style.display = p==="monthly"?"block":"none";
  document.getElementById("summaryPage").style.display = p==="summary"?"block":"none";
};

// 🔹 MONTHLY
function renderMonthly(data){
  const div = document.getElementById("monthlyPage");
  div.innerHTML = "";

  const month = getMonth();
  const year = getYear();

  document.getElementById("monthDisplay").innerText = month + " " + year;

  const members = ["Loka","Balu","Venky","Raju","Suresh","Mohan","Yogi"];

  let total = 0;

  members.forEach(name=>{
    const entry = data.find(d=>d.name===name && d.month===month && d.year===year);

    const amount = entry ? entry.amount : 0;
    const paid = entry ? entry.paid : false;
    const id = entry ? entry.id : null;

    total += amount;

    div.innerHTML += `
    <div class="card">
      <div class="row">
        <b>${name}</b>
        ${isOwner ? `<span onclick="toggle('${id}', ${paid}, '${name}')">${paid ? "✔":"❌"}</span>` : ""}
      </div>

      <div class="row">
        ₹ <input class="input" value="${amount}" 
        onchange="updateAmount('${id}','${name}', this.value)">
        ${!paid ? `<span onclick="whatsapp('${name}', ${amount})">💬</span>` : ""}
      </div>
    </div>`;
  });

  div.innerHTML = `
  <div class="card">
    <b>${month} ${year}</b><br>
    Collected: ₹${total}
  </div>` + div.innerHTML;
}

// 🔹 SUMMARY (FULL GRID)
function renderSummary(data){
  const div = document.getElementById("summaryPage");
  const year = getYear();

  const members = ["Loka","Balu","Venky","Raju","Suresh","Mohan","Yogi"];

  let total = 0;
  let memberTotals = {};

  data.forEach(d=>{
    if(d.year===year && d.paid){
      total += d.amount || 0;
      memberTotals[d.name]=(memberTotals[d.name]||0)+d.amount;
    }
  });

  let html = `
  <div class="card">
    <b>Overall Summary</b><br><br>
    Total Fund Collected<br>
    <h2>₹${total}</h2>
  </div>`;

  members.forEach(m=>{
    html += `<div class="card row"><span>${m}</span><b>₹${memberTotals[m]||0}</b></div>`;
  });

  html += `<div class="card"><b>${year} Breakdown</b><br><br><table>
  <tr><th>Member</th>${months.map(m=>`<th>${m.slice(0,3)}</th>`).join("")}<th>Total</th></tr>`;

  members.forEach(name=>{
    let rowTotal=0;
    html+=`<tr><td>${name}</td>`;

    months.forEach(m=>{
      const e=data.find(d=>d.name===name && d.month===m && d.year===year);
      const amt=e?e.amount:0;
      rowTotal+=amt;
      html+=`<td>${amt||"-"}</td>`;
    });

    html+=`<td><b>${rowTotal}</b></td></tr>`;
  });

  html+=`</table></div>`;

  div.innerHTML=html;
}

// 🔄 DATA
onSnapshot(collection(db,"fund"), snap=>{
  const data=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderMonthly(data);
  renderSummary(data);
});

// ✏️ UPDATE
window.updateAmount = async function(id,name,val){
  const month=getMonth();
  const year=getYear();

  if(id){
    await updateDoc(doc(db,"fund",id),{amount:Number(val)});
  }else{
    await addDoc(collection(db,"fund"),{
      name,month,year,amount:Number(val),paid:false
    });
  }
};

// ✔ TOGGLE (FIXED)
window.toggle = async function(id,current,name){
  const month=getMonth();
  const year=getYear();

  if(id){
    await updateDoc(doc(db,"fund",id),{paid:!current});
  }else{
    await addDoc(collection(db,"fund"),{
      name,month,year,amount:0,paid:true
    });
  }
};

// 💬
window.whatsapp = (name,amount)=>{
  window.open("https://wa.me/?text="+encodeURIComponent(`Hi ${name}, please pay ₹${amount}`));
};

</script>

</body>
</html>
